<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#090909">
  <title>Loading B58 Exhaust Design Lab v3.1</title>
  <style>html,body{margin:0;min-height:100%;background:#090909;color:#f4f4f4;font-family:system-ui,-apple-system,sans-serif}main{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}p{max-width:620px;color:#aaa;line-height:1.55}.spinner{width:36px;height:36px;margin:0 auto 18px;border:3px solid #333;border-top-color:#eee;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style>
</head>
<body>
<main><div><div class="spinner"></div><h1>B58 Exhaust Design Lab v3.1</h1><p id="status">Loading and verifying the audited release…</p></div></main>
<script>
(async()=>{
  const status=document.getElementById('status');
  const hex=buffer=>[...new Uint8Array(buffer)].map(byte=>byte.toString(16).padStart(2,'0')).join('');
  try{
    const parts=[];
    for(let i=0;i<16;i++){
      const name=String(i).padStart(2,'0');
      const response=await fetch(`.release/v3.1/part-${name}.b64?v=3.1.0`,{cache:'no-store'});
      if(!response.ok)throw new Error(`release segment ${name} returned ${response.status}`);
      parts.push((await response.text()).trim());
    }
    const binary=atob(parts.join(''));
    const compressed=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++)compressed[i]=binary.charCodeAt(i);
    const compressedHash=hex(await crypto.subtle.digest('SHA-256',compressed));
    if(compressedHash!=='ab18c4fbcf43ffb7104eb8423564bcd2822c452870639e8a2f5b9d14871a451a')throw new Error('compressed release checksum failed');
    if(!('DecompressionStream' in window))throw new Error('this browser cannot decompress the release; use the GitHub Actions Pages source');
    const stream=new Blob([compressed]).stream().pipeThrough(new DecompressionStream('gzip'));
    const html=await new Response(stream).text();
    const htmlHash=hex(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(html)));
    if(htmlHash!=='a9c2cc9462ca195088c3d1a8367da0187bb5acdc11e7a3f1204433c15c3062b6')throw new Error('final HTML checksum failed');
    if(!html.includes('app-version" content="3.1.0'))throw new Error('v3.1 release marker missing');
    document.open();document.write(html);document.close();
  }catch(error){
    console.error(error);
    status.textContent=`Could not load the audited release: ${error.message}`;
  }
})();
</script>
</body>
</html>
