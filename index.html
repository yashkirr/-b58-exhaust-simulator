<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <title>Loading B58 Dual-Path Exhaust Lab v2</title>
  <style>
    html,body{margin:0;min-height:100%;background:#080808;color:#f5f5f5;font-family:system-ui,-apple-system,sans-serif}
    main{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}
    p{color:#aaa;line-height:1.5;max-width:560px}.spin{width:34px;height:34px;border:3px solid #333;border-top-color:#eee;border-radius:50%;animation:s .8s linear infinite;margin:0 auto 18px}@keyframes s{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<main><div><div class="spin"></div><h1>B58 Exhaust Lab v2</h1><p id="status">Loading the verified physics-informed build…</p></div></main>
<script>
(async()=>{
  const status=document.getElementById('status');
  try{
    const parts=[];
    for(let i=0;i<7;i++){
      const name=String(i).padStart(2,'0');
      const response=await fetch(`.site-chunks/${name}.b64?v=2`,{cache:'no-store'});
      if(!response.ok) throw new Error(`bundle part ${name} returned ${response.status}`);
      parts.push((await response.text()).trim());
    }
    const binary=atob(parts.join(''));
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    const html=new TextDecoder('utf-8').decode(bytes);
    if(!html.includes('app-version" content="2.0.0')) throw new Error('v2 integrity marker missing');
    document.open(); document.write(html); document.close();
  }catch(error){
    console.error(error);
    status.textContent=`Could not load v2: ${error.message}. In Repository Settings → Pages, select GitHub Actions as the source.`;
  }
})();
</script>
</body>
</html>
