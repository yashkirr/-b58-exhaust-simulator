<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <title>Loading B58 Dual-Path Exhaust Lab v2.1</title>
  <style>
    html,body{margin:0;min-height:100%;background:#080808;color:#f5f5f5;font-family:system-ui,-apple-system,sans-serif}
    main{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}
    p{color:#aaa;line-height:1.5;max-width:560px}.spin{width:34px;height:34px;border:3px solid #333;border-top-color:#eee;border-radius:50%;animation:s .8s linear infinite;margin:0 auto 18px}@keyframes s{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<main><div><div class="spin"></div><h1>B58 Exhaust Lab v2.1</h1><p id="status">Loading the checksum-verified physics-informed build…</p></div></main>
<script>
(async()=>{
  const status=document.getElementById('status');
  try{
    if(typeof DecompressionStream==='undefined') throw new Error('this browser does not support gzip decompression');
    const paths=[
      '.site-v22/00.gz.b64','.site-v22/01.gz.b64',
      '.site-fix/00.b64','.site-fix/01.b64','.site-fix/02.b64','.site-fix/03.b64',
      '.site-fix/04.b64','.site-fix/05.b64','.site-fix/06.b64','.site-fix/07.b64',
      '.site-v22/03.gz.b64','.site-v22/04.gz.b64','.site-v22/05.gz.b64'
    ];
    const parts=[];
    for(const path of paths){
      const response=await fetch(`${path}?v=21`,{cache:'no-store'});
      if(!response.ok) throw new Error(`${path} returned ${response.status}`);
      parts.push((await response.text()).trim());
    }
    const binary=atob(parts.join(''));
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
    const html=await new Response(stream).text();
    if(!html.includes('function relativeDualTransfer')) throw new Error('v2.1 integrity marker missing');
    document.open(); document.write(html); document.close();
  }catch(error){
    console.error(error);
    status.textContent=`Could not load v2.1: ${error.message}. In Repository Settings → Pages, select GitHub Actions as the source.`;
  }
})();
</script>
</body>
</html>
