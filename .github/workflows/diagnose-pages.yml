name: Diagnose Pages workflow

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/diagnose-pages.yml
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Allow deployment run to complete
        run: sleep 25

      - name: Capture recent workflow runs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs?per_page=20" \
            > /tmp/runs.json

          jq '{captured_at: now | todate, diagnostic_run_id: env.GITHUB_RUN_ID, runs: [.workflow_runs[] | {id, name, status, conclusion, event, head_sha, html_url, created_at, updated_at}]}' \
            /tmp/runs.json > ACTIONS_DIAGNOSTICS.json

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin main
          git add ACTIONS_DIAGNOSTICS.json
          git diff --cached --quiet || git commit -m "Record final Actions diagnostics [skip ci]"
          git push origin HEAD:main
