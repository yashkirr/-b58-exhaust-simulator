name: Verify Pages deployment

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-pages.yml
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Allow deployment to finish
        run: sleep 35

      - name: Capture deployment results
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs?per_page=12" \
            > /tmp/runs.json

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin main

          jq '{captured_at: now | todate, runs: [.workflow_runs[] | {id, name, status, conclusion, head_sha, html_url, created_at, updated_at}]}' \
            /tmp/runs.json > PAGES_VERIFICATION.json

          git add PAGES_VERIFICATION.json
          git diff --cached --quiet || git commit -m "Record Pages verification [skip ci]"
          git push origin HEAD:main
