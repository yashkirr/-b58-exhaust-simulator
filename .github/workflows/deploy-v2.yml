name: Deploy B58 Exhaust Lab v3.1

on:
  push:
    branches: [main]
    paths-ignore:
      - DEPLOYMENT_STATUS.md
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static Pages directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/.release/v3.1
          cp index.html dist/index.html
          cp service-worker.js dist/service-worker.js
          cp .release/v3.1/part-*.b64 dist/.release/v3.1/
          touch dist/.nojekyll

          test -s dist/index.html
          test "$(find dist/.release/v3.1 -name 'part-*.b64' | wc -l)" -eq 16
          grep -q 'Loading B58 Exhaust Design Lab v3.1' dist/index.html
          grep -q 'ab18c4fbcf43ffb7104eb8423564bcd2822c452870639e8a2f5b9d14871a451a' dist/index.html
          grep -q 'a9c2cc9462ca195088c3d1a8367da0187bb5acdc11e7a3f1204433c15c3062b6' dist/index.html

          printf 'Prepared Pages artifact with %s release segments\n' \
            "$(find dist/.release/v3.1 -name 'part-*.b64' | wc -l)"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    if: always()
    needs: [build, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Record workflow outcome
        shell: bash
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail
          cat > DEPLOYMENT_STATUS.md <<EOF
          # GitHub Pages deployment status

          - Build: ${BUILD_RESULT}
          - Deploy: ${DEPLOY_RESULT}
          - Source commit: ${GITHUB_SHA}
          - Workflow run: ${GITHUB_RUN_ID}
          - Page URL: ${PAGE_URL:-unavailable}
          - Recorded at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          EOF

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin main
          git add DEPLOYMENT_STATUS.md
          git diff --cached --quiet || git commit -m "Record Pages workflow outcome [skip ci]"
          git push origin HEAD:main
