name: Deploy B58 Exhaust Lab v3.1

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reconstruct and verify v3.1 release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          # The release is split into small Base64 files because the connector
          # previously truncated a single large upload. The final HTML checksum
          # is the authoritative integrity check.
          cat .release/v3.1/part-*.b64 \
            | tr -d '\r\n' \
            | base64 --decode \
            > /tmp/b58-v31.html.gz

          gzip -t /tmp/b58-v31.html.gz
          gzip -dc /tmp/b58-v31.html.gz > dist/index.html

          echo "a9c2cc9462ca195088c3d1a8367da0187bb5acdc11e7a3f1204433c15c3062b6  dist/index.html" \
            | sha256sum -c -

          grep -q 'app-version" content="3.1.0' dist/index.html
          grep -q 'function sharedNormalise' dist/index.html
          grep -q 'function runAudit' dist/index.html
          grep -q 'Best fit retained' dist/index.html

          cp service-worker.js dist/service-worker.js
          touch dist/.nojekyll
          test -s dist/index.html
          printf 'Built %s bytes\n' "$(wc -c < dist/index.html)"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
