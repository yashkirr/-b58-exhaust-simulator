name: Deploy physics-informed simulator

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reconstruct verified site
        shell: bash
        run: |
          mkdir -p dist
          cat .site-chunks/*.b64 | tr -d '\n' | base64 --decode > dist/index.html
          echo "485f48ab0d396048f8b736c832bd043cfa698228cdad0782e8634f2aba4c37aa  dist/index.html" | sha256sum -c -
          cp service-worker.js dist/service-worker.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
