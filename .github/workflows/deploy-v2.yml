name: Deploy B58 Exhaust Lab v3.1

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reconstruct and audit v3.1 release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cat .release/v3.1/part-*.b64 | tr -d '\n' | base64 --decode > /tmp/b58-v31.html.gz
          echo "ab18c4fbcf43ffb7104eb8423564bcd2822c452870639e8a2f5b9d14871a451a  /tmp/b58-v31.html.gz" | sha256sum -c -
          gzip -dc /tmp/b58-v31.html.gz > dist/index.html
          echo "a9c2cc9462ca195088c3d1a8367da0187bb5acdc11e7a3f1204433c15c3062b6  dist/index.html" | sha256sum -c -
          grep -q 'app-version" content="3.1.0' dist/index.html
          grep -q 'function sharedNormalise' dist/index.html
          grep -q 'function runAudit' dist/index.html
          grep -q 'Best fit retained' dist/index.html
          cp service-worker.js dist/service-worker.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
